version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: analyistpro
      POSTGRES_PASSWORD: analyistpro
      POSTGRES_DB: analyistpro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyistpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://analyistpro:analyistpro@db:5432/analyistpro
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: production
      # Set SENTRY_DSN to enable error tracking
      # SENTRY_DSN: ""
      # Set ANTHROPIC_API_KEY for AI chat
      # ANTHROPIC_API_KEY: ""
      # S3 file storage (leave S3_BUCKET empty to use local disk volume)
      # S3_BUCKET: ""
      # AWS_REGION: us-east-1
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://analyistpro:analyistpro@db:5432/analyistpro
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      # SENTRY_DSN: ""
      # ANTHROPIC_API_KEY: ""
      # S3_BUCKET: ""
      # AWS_REGION: us-east-1
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
